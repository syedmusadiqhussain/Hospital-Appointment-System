<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Appointment System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navbar -->
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold flex items-center">
                <i class="fas fa-heartbeat mr-2"></i> HealthConnect
            </div>
            <div>
                <a href="#" class="hover:text-blue-200 px-3">Home</a>
                <a href="#" class="hover:text-blue-200 px-3">Doctors</a>
                <a href="#" class="hover:text-blue-200 px-3">About</a>
            </div>
        </div>
    </nav>

    <!-- Hero / AI Search -->
    <div class="bg-blue-700 pb-20 pt-10 px-6 text-center text-white">
        <h1 class="text-4xl font-bold mb-4">Find Your Perfect Doctor</h1>
        <p class="text-xl mb-8">Use our AI agent to find specialists near you</p>
        
        <div class="max-w-2xl mx-auto relative">
            <input type="text" id="ai-search-input" 
                class="w-full px-6 py-4 rounded-full text-gray-800 focus:outline-none focus:ring-4 focus:ring-blue-300 shadow-xl text-lg"
                placeholder="e.g. 'Find a cardiologist in Lahore' or 'I need a skin specialist in Karachi'">
            <button onclick="performSearch()" 
                class="absolute right-2 top-2 bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-full transition duration-300">
                <i class="fas fa-search"></i> Search
            </button>
        </div>
        <div id="ai-message" class="mt-4 text-blue-100 hidden"></div>
    </div>

    <!-- Main Content -->
    <div class="container mx-auto px-6 -mt-10">
        <div class="bg-white rounded-lg shadow-xl p-6 min-h-screen">
            
            <!-- Filters -->
            <div class="flex flex-wrap gap-4 mb-8 justify-center">
                <select id="city-filter" onchange="applyFilters()" class="px-4 py-2 border rounded-lg bg-gray-50">
                    <option value="">All Cities</option>
                    <!-- Cities will be populated here -->
                </select>
                <select id="specialty-filter" onchange="applyFilters()" class="px-4 py-2 border rounded-lg bg-gray-50">
                    <option value="">All Specialties</option>
                    <!-- Specialties will be populated here -->
                </select>
                <button onclick="resetFilters()" class="text-blue-600 hover:text-blue-800">Clear Filters</button>
            </div>

            <!-- Doctor Grid -->
            <div id="doctors-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Doctor cards will be inserted here -->
                <div class="col-span-full text-center py-10 text-gray-500">
                    <i class="fas fa-spinner fa-spin text-3xl"></i> Loading doctors...
                </div>
            </div>
        </div>
    </div>

    <!-- Appointment Modal -->
    <div id="appointment-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-8 max-w-md w-full m-4">
            <h2 class="text-2xl font-bold mb-4">Book Appointment</h2>
            <div id="modal-doctor-info" class="mb-6 p-4 bg-blue-50 rounded text-sm text-blue-800"></div>
            
            <form id="booking-form" onsubmit="handleBooking(event)">
                <input type="hidden" id="booking-doctor-id">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Your Name</label>
                    <input type="text" id="patient-name" required class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Phone Number</label>
                    <input type="tel" id="patient-phone" required class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Preferred Date/Time</label>
                    <input type="datetime-local" id="appointment-time" required class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Confirm Booking</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // API Base URL
        const API_URL = 'http://127.0.0.1:8000';
        let allDoctors = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                fetchCities(),
                fetchSpecialties(),
                fetchAllDoctors()
            ]);
        });

        async function fetchCities() {
            try {
                const res = await fetch(`${API_URL}/cities`);
                const cities = await res.json();
                const select = document.getElementById('city-filter');
                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    select.appendChild(option);
                });
            } catch (e) { console.error('Error fetching cities:', e); }
        }

        async function fetchSpecialties() {
            try {
                const res = await fetch(`${API_URL}/specialties`);
                const specialties = await res.json();
                const select = document.getElementById('specialty-filter');
                specialties.forEach(spec => {
                    const option = document.createElement('option');
                    option.value = spec;
                    option.textContent = spec;
                    select.appendChild(option);
                });
            } catch (e) { console.error('Error fetching specialties:', e); }
        }

        async function fetchAllDoctors() {
            try {
                const res = await fetch(`${API_URL}/doctors`);
                allDoctors = await res.json();
                renderDoctors(allDoctors);
            } catch (e) {
                console.error('Error fetching doctors:', e);
                document.getElementById('doctors-grid').innerHTML = '<div class="col-span-full text-center text-red-500">Failed to load doctors</div>';
            }
        }

        function renderDoctors(doctors) {
            const grid = document.getElementById('doctors-grid');
            if (doctors.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10">No doctors found matching your criteria.</div>';
                return;
            }

            grid.innerHTML = doctors.map(doc => `
                <div class="bg-white border rounded-xl overflow-hidden hover:shadow-lg transition duration-300 flex flex-col">
                    <div class="p-6 flex-grow">
                        <div class="flex items-start justify-between mb-4">
                            <div>
                                <h3 class="text-xl font-bold text-gray-800">${doc.name}</h3>
                                <p class="text-blue-600 font-medium">${doc.specialization || doc.category}</p>
                            </div>
                            <div class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full">
                                ${doc.city}
                            </div>
                        </div>
                        
                        <div class="space-y-2 text-sm text-gray-600 mb-4">
                            <p><i class="fas fa-hospital w-5 text-gray-400"></i> ${doc.hospital}</p>
                            <p><i class="fas fa-map-marker-alt w-5 text-gray-400"></i> ${doc.location}</p>
                            <p><i class="fas fa-money-bill-wave w-5 text-gray-400"></i> ${doc.consultation_fee || 'Fee not listed'}</p>
                            <p><i class="far fa-clock w-5 text-gray-400"></i> ${doc.wait_time || 'Check availability'}</p>
                        </div>
                    </div>
                    <div class="p-4 bg-gray-50 border-t">
                        <button onclick="openBookingModal(${doc.id}, '${doc.name.replace(/'/g, "\\'")}', '${doc.hospital.replace(/'/g, "\\'")}')" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition duration-200">
                            Book Appointment
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function performSearch() {
            const query = document.getElementById('ai-search-input').value;
            if (!query) return;

            const btn = document.querySelector('button[onclick="performSearch()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Searching...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: query })
                });
                const response = await res.json();
                
                // Show AI message
                const msgEl = document.getElementById('ai-message');
                msgEl.textContent = response.message;
                msgEl.classList.remove('hidden');

                // Update grid with AI results
                if (response.data) {
                    renderDoctors(response.data);
                }
            } catch (e) {
                console.error('Search error:', e);
                alert('Search failed. Please try again.');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Allow Enter key in search
        document.getElementById('ai-search-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                performSearch();
            }
        });

        async function applyFilters() {
            const city = document.getElementById('city-filter').value;
            const specialty = document.getElementById('specialty-filter').value;
            
            let url = `${API_URL}/doctors?`;
            if (city) url += `city=${encodeURIComponent(city)}&`;
            if (specialty) url += `specialty=${encodeURIComponent(specialty)}&`;
            
            try {
                const res = await fetch(url);
                const doctors = await res.json();
                renderDoctors(doctors);
                document.getElementById('ai-message').classList.add('hidden');
            } catch (e) { console.error('Filter error:', e); }
        }

        function resetFilters() {
            document.getElementById('city-filter').value = '';
            document.getElementById('specialty-filter').value = '';
            document.getElementById('ai-search-input').value = '';
            document.getElementById('ai-message').classList.add('hidden');
            fetchAllDoctors();
        }

        // Modal Logic
        function openBookingModal(id, name, hospital) {
            document.getElementById('booking-doctor-id').value = id;
            document.getElementById('modal-doctor-info').innerHTML = `Booking with <strong>${name}</strong><br>at ${hospital}`;
            document.getElementById('appointment-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('appointment-modal').classList.add('hidden');
        }

        async function handleBooking(e) {
            e.preventDefault();
            const data = {
                doctor_id: parseInt(document.getElementById('booking-doctor-id').value),
                patient_name: document.getElementById('patient-name').value,
                patient_phone: document.getElementById('patient-phone').value,
                appointment_time: document.getElementById('appointment-time').value
            };

            try {
                const res = await fetch(`${API_URL}/appointments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (res.ok) {
                    alert('Appointment booked successfully!');
                    closeModal();
                    document.getElementById('booking-form').reset();
                } else {
                    alert('Booking failed. Please try again.');
                }
            } catch (error) {
                console.error('Booking error:', error);
                alert('An error occurred.');
            }
        }
    </script>
</body>
</html>
